name: CI pipeline

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  name: Koodi kontroll
  runs-on: ubuntu-latest
  steps: 
    - name: Lae kood alla
      uses: actions/checkout@v4
    
    - name: Paigalda Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Paigalda sõltuvused
      run: npm install

    - name: Kontrolli üntaksi vigu
      run: node --check src/server.js src/routes/users.js src/routes/menu.js src/routes/orders.js

  test:
    name: Automaattestid
    runs-on: ubuntu-latest

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Käivita server
        run: node src/server.js &

      - name: Oota serveri käivitumist
        run: sleep 3

      - name: Käivita testid
        run: node src/test.js
