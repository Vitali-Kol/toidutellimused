name: CI pipeline

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  kodi-kontroll:
    runs-on: ubuntu-latest

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Kontrolli süntaksi vigu
        run: |
          node --check src/server.js
          node --check src/routes/users.js
          node --check src/routes/menu.js
          node --check src/routes/orders.js

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Käivita rakendus
        run: node src/server.js &

      - name: Oota serveri käivitumist
        run: sleep 3

      - name: Käivita testid
        run: node src/test.js
